<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

ou are CVGenius AI Assistant. Your role is to help users improve CV quality, interview readiness, and job application content.\\n\\nRules:\\n- Keep advice practical and specific.\\n- If the user asks outside CV/career context, gently steer back to career support.\\n- Use concise sections and examples when useful.\\n- Answer in language: {language}.\\n\"\r\n    );\r\n\r\n    if let Some(cv) = cv_summary.filter(|v| !v.trim().is_empty()) {\r\n        prompt.push_str(\u0026format!(\"\\nCV context (may be partial):\\n{cv}\\n\"));\r\n    }\r\n\r\n    if let Some(jd) = jd_text.filter(|v| !v.trim().is_empty()) {\r\n        prompt.push_str(\u0026format!(\"\\nTarget job description:\\n{jd}\\n\"));\r\n    }\r\n\r\n    if !history_lines.is_empty() {\r\n        prompt.push_str(\"\\nRecent conversation:\\n\");\r\n        prompt.push_str(\u0026history_lines.join(\"\\n\"));\r\n        prompt.push('\\n');\r\n    }\r\n\r\n    prompt.push_str(\u0026format!(\"\\nUser question: {message}\\n\\nRespond as plain text, no JSON.\"));\r\n    prompt\r\n}\r\n","traces":[{"line":1,"address":[],"length":0,"stats":{"Line":0}},{"line":8,"address":[],"length":0,"stats":{"Line":0}},{"line":12,"address":[],"length":0,"stats":{"Line":0}},{"line":13,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":17,"address":[],"length":0,"stats":{"Line":0}},{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":12},{"path":["C:","\\","Users","PC","Desktop","rust-vision-buddy","backend","src","modules","ai","service.rs"],"content":"use crate::{\r\n    modules::ai::{\r\n        gemini_client,\r\n        models::{ChatAssistantResponse, ChatMessage},\r\n        prompt_templates,\r\n    },\r\n    shared::{api_error::ApiError, app_state::AppState},\r\n};\r\n\r\n/// Xử lý hội thoại với trợ lý AI dựa trên ngữ cảnh CV và JD\r\npub async fn chat_assistant(\r\n    state: \u0026AppState,\r\n    message: \u0026str,\r\n    language: \u0026str,\r\n    jd_text: Option\u003c\u0026str\u003e,\r\n    cv_summary: Option\u003c\u0026str\u003e,\r\n    history: Option\u003c\u0026[ChatMessage]\u003e,\r\n) -\u003e Result\u003cChatAssistantResponse, ApiError\u003e {\r\n    // Lấy 8 tin nhắn gần nhất để làm ngữ cảnh cho AI\r\n    let history_lines = history\r\n        .unwrap_or(\u0026[])\r\n        .iter()\r\n        .rev()\r\n        .take(8)\r\n        .collect::\u003cVec\u003c_\u003e\u003e()\r\n        .into_iter()\r\n        .rev()\r\n        .map(|item| format!(\"{}: {}\", item.role, item.content))\r\n        .collect::\u003cVec\u003c_\u003e\u003e();\r\n\r\n    let prompt = prompt_templates::chat_assistant_prompt(\r\n        message,\r\n        language,\r\n        jd_text,\r\n        cv_summary,\r\n        \u0026history_lines,\r\n    );\r\n\r\n    let reply = gemini_client::generate_text(state, prompt).await?;\r\n\r\n    Ok(ChatAssistantResponse {\r\n        reply: reply.trim().to_string(),\r\n    })\r\n}\r\n\r\n/// Hàm tính điểm cơ bản dựa trên từ khóa (được sử dụng cho logic so khớp sơ bộ)\r\npub fn calculate_baseline_score(cv_text: \u0026str, jd_text: \u0026str) -\u003e f64 {\r\n    if cv_text.is_empty() || jd_text.is_empty() {\r\n        return 0.0;\r\n    }\r\n\r\n    let cv_lower = cv_text.to_lowercase();\r\n    let jd_lower = jd_text.to_lowercase();\r\n\r\n    // Danh sách từ khóa kỹ thuật phổ biến để so khớp\r\n    let keywords = [\r\n        \"rust\",\r\n        \"python\",\r\n        \"react\",\r\n        \"typescript\",\r\n        \"axum\",\r\n        \"node\",\r\n        \"sql\",\r\n        \"docker\",\r\n    ];\r\n    let mut matches = 0;\r\n    let mut total_relevant = 0;\r\n\r\n    for kw in keywords {\r\n        if jd_lower.contains(kw) {\r\n            total_relevant += 1;\r\n            if cv_lower.contains(kw) {\r\n                matches += 1;\r\n            }\r\n        }\r\n    }\r\n\r\n    if total_relevant == 0 {\r\n        return 0.0;\r\n    }\r\n    (matches as f64 / total_relevant as f64) * 100.0\r\n}\r\n\r\n// =================================================================\r\n// UNIT TESTS - GIAI ĐOẠN 1: BOUNDARY ANALYSIS\r\n// =================================================================\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn test_calculate_baseline_score_boundaries() {\r\n        // 1. Định nghĩa bảng dữ liệu test (Table-Driven Tests)\r\n        struct TestCase {\r\n            name: \u0026'static str,\r\n            cv_text: \u0026'static str,\r\n            jd_text: \u0026'static str,\r\n            expected_min: f64,\r\n        }\r\n\r\n        let test_cases = vec![\r\n            TestCase {\r\n                name: \"Biên dưới: Chuỗi rỗng hoàn toàn\",\r\n                cv_text: \"\",\r\n                jd_text: \"\",\r\n                expected_min: 0.0,\r\n            },\r\n            TestCase {\r\n                name: \"Biên dưới: CV chỉ có 1 ký tự\",\r\n                cv_text: \"A\",\r\n                jd_text: \"Software Engineer\",\r\n                expected_min: 0.0,\r\n            },\r\n            TestCase {\r\n                name: \"Dữ liệu rác: Toàn ký tự đặc biệt\",\r\n                cv_text: \"!@#$%^\u0026*()_+\",\r\n                jd_text: \"Rust Developer\",\r\n                expected_min: 0.0,\r\n            },\r\n            TestCase {\r\n                name: \"Dữ liệu khớp hoàn toàn: Trường hợp lý tưởng\",\r\n                cv_text: \"Rust Python React TypeScript Axum\",\r\n                jd_text: \"Rust Python React TypeScript Axum\",\r\n                expected_min: 40.0,\r\n            },\r\n            TestCase {\r\n                name: \"Dữ liệu không liên quan: Điểm thấp\",\r\n                cv_text: \"Kế toán trưởng chuyên nghiệp\",\r\n                jd_text: \"Embedded C++ Engineer\",\r\n                expected_min: 0.0,\r\n            },\r\n        ];\r\n\r\n        // 2. Chạy qua từng trường hợp kiểm thử\r\n        for tc in test_cases {\r\n            let score = calculate_baseline_score(tc.cv_text, tc.jd_text);\r\n\r\n            assert!(\r\n                score \u003e= tc.expected_min,\r\n                \"FAILED [{}] - Score nhận được: {} (Kỳ vọng \u003e= {})\",\r\n                tc.name,\r\n                score,\r\n                tc.expected_min\r\n            );\r\n        }\r\n    }\r\n}\r\n","traces":[{"line":11,"address":[],"length":0,"stats":{"Line":0}},{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":39,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":48,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":49,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":52,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":53,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":56,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":57,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":58,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":59,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":60,"address":[],"length":0,"stats":{"Line": load.password.trim(), \u0026state).await?;\r\n\r\n    Ok(ok(RegisterResponse {\r\n        message: \"Registered successfully\",\r\n        email,\r\n    }))\r\n}\r\n\r\npub async fn login(\r\n    State(state): State\u003cAppState\u003e,\r\n    Json(payload): Json\u003cLoginRequest\u003e,\r\n) -\u003e Result\u003cimpl axum::response::IntoResponse, ApiError\u003e {\r\n    let email = payload.email.trim().to_lowercase();\r\n    service::validate_credentials(\u0026email, payload.password.trim(), \u0026state).await?;\r\n    let token = service::login(\u0026email, \u0026state)?;\r\n\r\n    Ok(ok(LoginResponse {\r\n        access_token: token,\r\n        token_type: \"Bearer\",\r\n        expires_in_minutes: state.settings.jwt_expires_minutes,\r\n    }))\r\n}\r\n\r\npub async fn logout(\r\n    State(state): State\u003cAppState\u003e,\r\n    headers: HeaderMap,\r\n) -\u003e Result\u003cimpl axum::response::IntoResponse, ApiError\u003e {\r\n    let token = extract_bearer(\u0026headers)?;\r\n    service::validate_bearer_token(\u0026token, \u0026state)?;\r\n    Ok(ok(LogoutResponse {\r\n        message: \"Logged out successfully\",\r\n    }))\r\n}\r\n\r\nfn extract_bearer(headers: \u0026HeaderMap) -\u003e Result\u003cString, ApiError\u003e {\r\n    let raw = headers\r\n        .get(\"authorization\")\r\n        .and_then(|value| value.to_str().ok())\r\n        .ok_or(ApiError::Unauthorized)?;\r\n\r\n    if let Some(token) = raw.strip_prefix(\"Bearer \") {\r\n        Ok(token.to_string())\r\n    } else {\r\n        Err(ApiError::Unauthorized)\r\n    }\r\n}\r\n\r\n// ==================== OAuth Handlers ====================\r\n\r\npub async fn google_login(\r\n    State(state): State\u003cAppState\u003e,\r\n    headers: HeaderMap,\r\n) -\u003e Result\u003cimpl axum::response::IntoResponse, ApiError\u003e {\r\n    let (auth_url, csrf_token) = oauth::generate_google_auth_url(\u0026state)?;\r\n    let frontend_url = extract_frontend_url(\u0026headers, \u0026state);\r\n    state.store_oauth_state(csrf_token, frontend_url).await;\r\n\r\n    Ok(ok(OAuthInitResponse {\r\n        authorization_url: auth_url,\r\n    }))\r\n}\r\n\r\npub async fn google_callback(\r\n    State(state): State\u003cAppState\u003e,\r\n    Query(params): Query\u003cOAuthCallbackRequest\u003e,\r\n) -\u003e Result\u003cResponse, ApiError\u003e {\r\n    let frontend_url = validate_oauth_state(params.state.as_deref(), \u0026state).await?;\r\n\r\n    if let Some(provider_error) = params.error.as_deref() {\r\n        let description = params\r\n            .error_description\r\n            .as_deref()\r\n            .unwrap_or(provider_error);\r\n        return Ok(build_oauth_error_bridge_response(\r\n            \u0026frontend_url,\r\n            \u0026state.settings.frontend_url,\r\n            description,\r\n        ));\r\n    }\r\n\r\n    let code = params\r\n        .code\r\n        .ok_or_else(|| ApiError::BadRequest(\"Missing authorization code\".to_string()))?;\r\n\r\n    let user_info = oauth::exchange_google_code(code, \u0026state).await?;\r\n\r\n    let user = service::find_or_create_oauth_user(\r\n        \u0026user_info.email,\r\n        user_info.name.as_deref(),\r\n        user_info.picture.as_deref(),\r\n        \u0026user_info.id,\r\n        AuthProvider::Google,\r\n        \u0026state,\r\n    )\r\n    .await?;\r\n\r\n    let token = service::login(\u0026user.email, \u0026state)?;\r\n    let frontend_url = frontend_url.trim_end_matches('/');\r\n\r\n    Ok(build_oauth_success_bridge_response(\r\n        frontend_url,\r\n        \u0026state.settings.frontend_url,\r\n        \u0026token,\r\n        \u0026user.email,\r\n    ))\r\n}\r\n\r\npub async fn github_login(\r\n    State(state): State\u003cAppState\u003e,\r\n    headers: HeaderMap,\r\n) -\u003e Result\u003cimpl axum::response::IntoResponse, ApiError\u003e {\r\n    let (auth_url, csrf_token) = oauth::generate_github_auth_url(\u0026state)?;\r\n    let frontend_url = extract_frontend_url(\u0026headers, \u0026state);\r\n    state.store_oauth_state(csrf_token, frontend_url).await;\r\n\r\n    Ok(ok(OAuthInitResponse {\r\n        authorization_url: auth_url,\r\n    }))\r\n}\r\n\r\npub async fn github_callback(\r\n    State(state): State\u003cAppState\u003e,\r\n    Query(params): Query\u003cOAuthCallbackRequest\u003e,\r\n) -\u003e Result\u003cResponse, ApiError\u003e {\r\n    let frontend_url = validate_oauth_state(params.state.as_deref(), \u0026state).await?;\r\n\r\n    if let Some(provider_error) = params.error.as_deref() {\r\n        let description = params\r\n            .error_description\r\n            .as_deref()\r\n            .unwrap_or(provider_error);\r\n        return Ok(build_oauth_error_bridge_response(\r\n            \u0026frontend_url,\r\n            \u0026state.settings.frontend_url,\r\n            description,\r\n        ));\r\n    }\r\n\r\n    let code = params\r\n        .code\r\n        .ok_or_else(|| ApiError::BadRequest(\"Missing authorization code\".to_string()))?;\r\n\r\n    let user_info = oauth::exchange_github_code(code, \u0026state).await?;\r\n\r\n    let email = user_info\r\n        .email\r\n        .unwrap_or_else(|| format!(\"{}@github.local\", user_info.login));\r\n\r\n    let user = service::find_or_create_oauth_user(\r\n        \u0026email,\r\n        user_info.name.as_deref(),\r\n        user_info.avatar_url.as_deref(),\r\n        \u0026user_info.id.to_string(),\r\n        AuthProvider::GitHub,\r\n        \u0026state,\r\n    )\r\n    .await?;\r\n\r\n    let token = service::login(\u0026user.email, \u0026state)?;\r\n    let frontend_url = frontend_url.trim_end_matches('/');\r\n\r\n    Ok(build_oauth_success_bridge_response(\r\n        frontend_url,\r\n        \u0026state.settings.frontend_url,\r\n        \u0026token,\r\n        \u0026user.email,\r\n    ))\r\n}\r\n\r\nasync fn validate_oauth_state(\r\n    state_param: Option\u003c\u0026str\u003e,\r\n    state: \u0026AppState,\r\n) -\u003e Result\u003cString, ApiError\u003e {\r\n    let token ngth":0,"stats":{"Line":0}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":44,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":17},{"path":["C:","\\","Users","PC","Desktop","rust-vision-buddy","backend","src","modules","content_generation","template_engine.rs"],"content":"use crate::modules::content_generation::models::ExtractedMetadata;\r\nuse regex::Regex;\r\nuse std::sync::OnceLock;\r\nuse tera::{Context, Tera};\r\n\r\nstatic TEMPLATES: OnceLock\u003cTera\u003e = OnceLock::new();\r\n\r\npub fn init_templates() -\u003e Result\u003c(), tera::Error\u003e {\r\n    let tera = Tera::new(\"templates/**/*.tera\")?;\r\n    TEMPLATES\r\n        .set(tera)\r\n        .map_err(|_| tera::Error::msg(\"Failed to initialize templates - already initialized\"))?;\r\n    Ok(())\r\n}\r\n\r\nfn get_templates() -\u003e \u0026'static Tera {\r\n    TEMPLATES.get().expect(\"Templates not initialized\")\r\n}\r\n\r\nfn normalize_style(style: \u0026str) -\u003e \u0026'static str {\r\n    match style.trim().to_lowercase().as_str() {\r\n        \"formal\" =\u003e \"formal\",\r\n        \"casual\" =\u003e \"casual\",\r\n        \"concise\" =\u003e \"concise\",\r\n        \"persuasive\" =\u003e \"persuasive\",\r\n        \"modern\" =\u003e \"casual\",\r\n        \"creative\" =\u003e \"persuasive\",\r\n        _ =\u003e \"auto\",\r\n    }\r\n}\r\n\r\nfn auto_style_from_jd(jd_text: \u0026str, language: \u0026str) -\u003e \u0026'static str {\r\n    let jd_lower = jd_text.to_lowercase();\r\n    let lang = language.trim().to_lowercase();\r\n\r\n    let formal_markers_vi = [\r\n        \"tập đoàn\", \"ngân hàng\", \"tuân thủ\", \"quy trình\", \"enterprise\",\r\n    ];\r\n    let formal_markers_en = [\r\n        \"corporation\", \"bank\", \"compliance\", \"governance\", \"enterprise\",\r\n    ];\r\n    let persuasive_markers = [\r\n        \"marketing\", \"sales\", \"growth\", \"brand\", \"business development\",\r\n    ];\r\n    let concise_markers = [\"startup\", \"fast-paced\", \"remote\", \"product\", \"agile\"];\r\n\r\n    if persuasive_markers.iter().any(|m| jd_lower.contains(m)) {\r\n        return \"persuasive\";\r\n    }\r\n    if concise_markers.iter().any(|m| jd_lower.contains(m)) {\r\n        return \"concise\";\r\n    }\r\n\r\n    if lang == \"vi\" {\r\n        if formal_markers_vi.iter().any(|m| jd_lower.contains(m)) {\r\n            return \"formal\";\r\n        }\r\n        return \"casual\";\r\n    }\r\n\r\n    if formal_markers_en.iter().any(|m| jd_lower.contains(m)) {\r\n        return \"formal\";\r\n    }\r\n    \"casual\"\r\n}\r\n\r\nfn resolve_style(style: \u0026str, jd_text: \u0026str, language: \u0026str) -\u003e \u0026'static str {\r\n    let normalized = normalize_style(style);\r\n    if normalized == \"auto\" {\r\n        return auto_style_from_jd(jd_text, language);\r\n    }\r\n    normalized\r\n}\r\n\r\nfn clean_line(line: \u0026str) -\u003e String {\r\n    line.replace('\\u{feff}', \"\")\r\n        .replace(['\\t', '|', '•', '●'], \" \")\r\n        .split_whitespace()\r\n        .collect::\u003cVec\u003c_\u003e\u003e()\r\n        .join(\" \")\r\n}\r\n\r\n#[allow(dead_code)]\r\nfn trim_trailing_punctuation(text: \u0026str) -\u003e String {\r\n    text.trim()\r\n        .trim_end_matches(|c: char| [',', ';', ':', '.'].contains(\u0026c))\r\n        .to_string()\r\n}\r\n\r\nfn looks_like_name(line: \u0026str) -\u003e bool {\r\n    let trimmed = line.trim();\r\n    if trimmed.is_empty() || trimmed.len() \u003c 4 || trimmed.len() \u003e 60 {\r\n        return false;\r\n    }\r\n\r\n    let lower = trimmed.to_lowercase();\r\n    let blocked_tokens = [\r\n        \"cv\", \"resume\", \"email\", \"phone\", \"address\", \"experience\", \"skills\", \"github\", \"linkedin\",\r\n    ];\r\n    if blocked_tokens.iter().any(|token| lower.contains(token)) {\r\n        return false;\r\n    }\r\n    if trimmed.chars().any(|c| c.is_ascii_digit()) {\r\n        return false;\r\n    }\r\n\r\n    let words = trimmed.split_whitespace().collect::\u003cVec\u003c_\u003e\u003e();\r\n    (2..=6).contains(\u0026words.len())\r\n}\r\n\r\nfn extract_candidate_name(cv_text: \u0026str) -\u003e String {\r\n    let lines: Vec\u003cString\u003e = cv_text.lines().map(clean_line).collect();\r\n    let name_re = Regex::new(r\"(?i)(full\\s*name|họ\\s*và\\s*tên|name)[:：-]\\s*([^,\\n;]+)\").unwrap();\r\n\r\n    for line in \u0026lines {\r\n        if let Some(cap) = name_re.captures(line) {\r\n            let n = clean_line(\u0026cap[2]);\r\n            if looks_like_name(\u0026n) {\r\n                return n;\r\n            }\r\n        }\r\n    }\r\n\r\n    for line in \u0026lines {\r\n        if looks_like_name(line) {\r\n            return line.clone();\r\n        }\r\n    }\r\n    \"Ứng viên\".to_string()\r\n}\r\n\r\nfn extract_years_experience(cv_text: \u0026str) -\u003e String {\r\n    let re = Regex::new(r\"(\\d+)\\s*\\+?\\s*(year|năm)\").unwrap();\r\n    re.captures(cv_text)\r\n        .map(|c| c[1].to_string())\r\n        .unwrap_or_else(|| \"3\".to_string())\r\n}\r\n\r\nfn extract_email(cv_text: \u0026str) -\u003e Option\u003cString\u003e {\r\n    let re = Regex::new(r\"(?i)\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}\\b\").unwrap();\r\n    re.find(cv_text).map(|m| m.as_str().to_string())\r\n}\r\n\r\nfn extract_phone(cv_text: \u0026str) -\u003e Option\u003cString\u003e {\r\n    let re = Regex::new(r\"(\\+?\\d[\\d\\s.-]{8,15}\\d)\").unwrap();\r\n    re.find(cv_text).map(|m| m.as_str().trim().to_string())\r\n}\r\n\r\nfn extract_address(cv_text: \u0026str) -\u003e Option\u003cString\u003e {\r\n    let re = Regex::new(r\"(?i)(address|địa\\s*chỉ)[:：-]\\s*(.+)\").unwrap();\r\n    for line in cv_text.lines() {\r\n        if let Some(cap) = re.captures(line) {\r\n            return Some(clean_line(\u0026cap[2]));\r\n        }\r\n    }\r\n    None\r\n}\r\n\r\nfn extract_key_skills(cv_text: \u0026str) -\u003e String {\r\n    let skill_patterns = [\r\n        \"python\", \"java\", \"javascript\", \"typescript\", \"react\", \"node\", \"docker\",\r\n        \"rust\", \"sql\", \"aws\", \"git\", \"linux\", \"ci/cd\", \"agile\",\r\n    ];\r\n    let lower = cv_text.to_lowercase();\r\n    let mut found = Vec::new();\r\n    for skill in skill_patterns {\r\n        if lower.contains(skill) {\r\n            found.push(skill);\r\n        }\r\n    }\r\n\r\n    if found.is_empty() {\r\n        \"Software Development, Problem Solving\".to_string()\r\n    } else {\r\n        found.join(\", \")\r\n    }\r\n}\r\n\r\nfn extract_certificates(cv_text: \u0026str) -\u003e Option\u003cString\u003e {\r\n    let re = Regex::new(r\"(?i)(certificate|chứng\\s*chỉ)[:：-]\\s*(.+)\").unwrap();\r\n    cv_text\r\n        .lines()\r\n        .find_map(|l| re.captures(l).map(|c| clean_line(\u0026c[2])))\r\n}\r\n\r\nfn extract_company_name(jd_text: \u0026str) -\u003e String {\r\n    let re = Regex::new(r\"(?i)(company|công\\s*ty)[:：-]\\s*([^,\\n;]+)\").unwrap();\r\n    jd_text\r\n        .lines()\r\n        .find_map(|l| re.captures(l).map(|c| clean_line(\u0026c[2])))\r\n        .unwrap_or_else(|| \"Quý công ty\".to_string())\r\n}\r\n\r\nfn extract_recipient(jd_text: \u0026str, language: \u0026str) -\u003e String {\r\n    let lang_vi = language.contains(\"vi\");\r\n    let re = Regex::new(r\"(?i)(dear|kính\\s*gửi|attention)[:：]?\\s*([^,\\n;]+)\").unwrap();\r\n\r\n    jd_text\r\n        .lines()\r\n        .find_map(|l| re.captures(l).map(|c| clean_line(\u0026c[2])))\r\n        .unwrap_or_else(|| {\r\n            if lang_vi {\r\n                \"Bộ phận Tuyển dụng\".to_string()\r\n            } else {\r\n                \"Hiring Manager\".to_string()\r\n            }\r\n        })\r\n}\r\n\r\nfn extract_position(jd_text: \u0026str) -\u003e String {\r\n    let re = Regex::new(r\"(?i)(position|vị\\s*trí)[:：-]\\s*([^,\\n;]+)\").unwrap();\r\n    jd_text\r\n        .lines()\r\n        .find_map(|l| re.captures(l).map(|c| clean_line(\u0026c[2])))\r\n        .unwrap_or_else(|| \"Software Engineer\".to_string())\r\n}\r\n\r\npub fn extract_metadata(cv_text: \u0026str, jd_text: \u0026str, language: \u0026str) -\u003e ExtractedMetadata {\r\n    ExtractedMetadata {\r\n        candidate_name: extract_candidate_name(cv_text),\r\n        recipient: extract_recipient(jd_text, language),\r\n        company_name: extract_company_name(jd_text),\r\n        position: extract_position(jd_text),\r\n        years_experience: extract_years_experience(cv_text),\r\n        key_skills: extract_key_skills(cv_text),\r\n        certificates: extract_certificates(cv_text),\r\n        email: extract_email(cv_text),\r\n        phone: extract_phone(cv_text),\r\n        address: extract_address(cv_text),\r\n    }\r\n}\r\n\r\nfn build_context(cv_text: \u0026str, jd_text: \u0026str, language: \u0026str) -\u003e Context {\r\n    let mut ctx = Context::new();\r\n    let meta = extract_metadata(cv_text, jd_text, language);\r\n    ctx.insert(\"candidate_name\", \u0026meta.candidate_name);\r\n    ctx.insert(\"years_experience\", \u0026meta.years_experience);\r\n    ctx.insert(\"key_skills\", \u0026meta.key_skills);\r\n    ctx.insert(\"company_name\", \u0026meta.company_name);\r\n    ctx.insert(\"position\", \u0026meta.position);\r\n    ctx.insert(\"recipient\", \u0026meta.recipient);\r\n    if let Some(e) = meta.email {\r\n        ctx.insert(\"email\", \u0026e);\r\n    }\r\n    if let Some(p) = meta.phone {\r\n        ctx.insert(\"phone\", \u0026p);\r\n    }\r\n    ctx\r\n}\r\n\r\n// Hàm render thật sự sử dụng Tera - Để test các hàm này cần mock file hệ thống hoặc init Tera\r\npub fn render_email_subject(cv: \u0026str, jd: \u0026str, lang: \u0026str, style: \u0026str) -\u003e Result\u003cString, tera::Error\u003e {\r\n    let s = resolve_style(style, jd, lang);\r\n    let name = format!(\"email_subject_{}_{}.tera\", s, lang);\r\n    get_templates().render(\u0026name, \u0026build_context(cv, jd, lang))\r\n}\r\n\r\npub fn render_email_body(cv: \u0026str, jd: \u0026str, lang: \u0026str, style: \u0026str) -\u003e Result\u003cString, tera::Error\u003e {\r\n    let s = resolve_style(style, jd, lang);\r\n    let name = format!(\"email_body_{}_{}.tera\", s, lang);\r\n    get_templates().render(\u0026name, \u0026build_context(cv, jd, lang))\r\n}\r\n\r\npub fn render_cover_letter(cv: \u0026str, jd: \u0026str, lang: \u0026str, style: \u0026str) -\u003e Result\u003cString, tera::Error\u003e {\r\n    let s = resolve_style(style, jd, lang);\r\n    let name = format!(\"cover_letter_{}_{}.tera\", s, lang);\r\n    get_templates().render(\u0026name, \u0026build_context(cv, jd, lang))\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn test_normalize_style() {\r\n        assert_eq!(normalize_style(\"FORMAL\"), \"formal\");\r\n        assert_eq!(normalize_style(\" creative \"), \"persuasive\");\r\n        assert_eq!(normalize_style(\"unknown\"), \"auto\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_auto_style_from_jd() {\r\n        let jd_bank = \"Làm việc tại ngân hàng với quy trình nghiêm ngặt\";\r\n        assert_eq!(auto_style_from_jd(jd_bank, \"vi\"), \"formal\");\r\n\r\n        let jd_startup = \"Fast-paced startup looking for agile developers\";\r\n        assert_eq!(auto_style_from_jd(jd_startup, \"en\"), \"concise\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_clean_line() {\r\n        let line = \"• Nguyễn | Văn \\t A\";\r\n        assert_eq!(clean_line(line), \"Nguyễn Văn A\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_extract_candidate_name() {\r\n        let cv = \"Họ và tên: Nguyễn Văn Rust\\nEmail: r \r\n            },\r\n            CvSection {\r\n                id: \"section-skills\".into(),\r\n                r#type: \"skills\".into(),\r\n                title: \"Kỹ năng\".into(),\r\n                visible: true,\r\n                items: vec![\r\n                    CvSectionItem {\r\n                        id: Uuid::new_v4().to_string(),\r\n                        title: \"React\".into(),\r\n                        ..Default::default()\r\n                    },\r\n                    CvSectionItem {\r\n                        id: Uuid::new_v4().to_string(),\r\n                        title: \"Rust\".into(),\r\n                        ..Default::default()\r\n                    },\r\n                    CvSectionItem {\r\n                        id: Uuid::new_v4().to_string(),\r\n                        title: \"Python\".into(),\r\n                        ..Default::default()\r\n                    },\r\n                ],\r\n                ..Default::default()\r\n            },\r\n            CvSection {\r\n                id: \"section-summary\".into(),\r\n                r#type: \"summary\".into(),\r\n                title: \"Giới thiệu\".into(),\r\n                visible: true,\r\n                content: Some(\"Đây là nội dung tóm tắt chuyên môn của tôi.\".into()),\r\n                ..Default::default()\r\n            },\r\n            CvSection {\r\n                id: \"section-exp\".into(),\r\n                r#type: \"experience\".into(),\r\n                title: \"Kinh nghiệm làm việc\".into(),\r\n                visible: true,\r\n                items: vec![CvSectionItem {\r\n                    id: Uuid::new_v4().to_string(),\r\n                    title: \"CÔNG TY ABC\".into(),\r\n                    subtitle: Some(\"Software Engineer\".into()),\r\n                    description: Some(\"Lập trình Rust/React\".into()),\r\n                    date: Some(\"2024 - Hiện tại\".into()),\r\n                    ..Default::default()\r\n                }],\r\n                ..Default::default()\r\n            },\r\n            CvSection {\r\n                id: \"section-edu\".into(),\r\n                r#type: \"education\".into(),\r\n                title: \"Học vấn\".into(),\r\n                visible: true,\r\n                items: vec![CvSectionItem {\r\n                    id: Uuid::new_v4().to_string(),\r\n                    title: \"ĐẠI HỌC CÔNG NGHỆ\".into(),\r\n                    subtitle: Some(\"Cử nhân CNTT\".into()),\r\n                    date: Some(\"2020 - 2024\".into()),\r\n                    ..Default::default()\r\n                }],\r\n                ..Default::default()\r\n            },\r\n        ],\r\n        layout: CvLayoutState {\r\n            full_width: vec![\"section-header\".into()],\r\n            left_column: vec![\"section-skills\".into()],\r\n            right_column: vec![\r\n                \"section-summary\".into(),\r\n                \"section-exp\".into(),\r\n                \"section-edu\".into(),\r\n            ],\r\n            unused: vec![],\r\n        },\r\n    };\r\n\r\n    let layout_value = serde_json::to_value(\u0026default_layout).map_err(|e| {\r\n        error!(\"🔥 Serialization failed: {:?}\", e);\r\n        StatusCode::INTERNAL_SERVER_ERROR\r\n    })?;\r\n\r\n    sqlx::query!(\r\n        r#\"INSERT INTO cvs (id, user_id, name, layout_data) VALUES ($1, $2, $3, $4)\"#,\r\n        cv_id,\r\n        user_id,\r\n        payload.name,\r\n        layout_value\r\n    )\r\n    .execute(\u0026state.db)\r\n    .await\r\n    .map_err(|e| {\r\n        error!(\"🔥 DB Insert Error: {:?}\", e);\r\n        StatusCode::INTERNAL_SERVER_ERROR\r\n    })?;\r\n\r\n    Ok((\r\n        StatusCode::CREATED,\r\n        Json(CvResponse {\r\n            id: cv_id,\r\n            message: \"Tạo CV thành công\".into(),\r\n        }),\r\n    ))\r\n}\r\n\r\n/// 2. Lấy chi tiết CV theo ID\r\npub async fn get_cv_by_id(\r\n    State(state): State\u003cAppState\u003e,\r\n    Path(id_st tion_score,\r\n    );\r\n\r\n    let mut score = 100.0\r\n        * (0.50 * signals.must_have_match\r\n            + 0.20 * signals.semantic_overlap\r\n            + 0.20 * signals.experience_fit\r\n            + 0.10 * signals.section_completeness);\r\n\r\n    let missing_must_have = signals.missing_skills.len();\r\n    if missing_must_have \u003e= 3 {\r\n        score -= 12.0;\r\n    } else if missing_must_have \u003e= 1 {\r\n        score -= 5.0;\r\n    }\r\n\r\n    let score = score.clamp(0.0, 100.0);\r\n\r\n    let (strengths, weaknesses, tips) = explain(signals);\r\n\r\n    ScoreCvResponse {\r\n        score: (score * 10.0).round() / 10.0,\r\n        strengths,\r\n        weaknesses,\r\n        improvement_tips: tips,\r\n    }\r\n}\r\n\r\nfn tokenize(text: \u0026str) -\u003e HashSet\u003cString\u003e {\r\n    text.to_lowercase()\r\n        .split(|c: char| !c.is_alphanumeric() \u0026\u0026 c != '+' \u0026\u0026 c != '#')\r\n        .map(str::trim)\r\n        .filter(|token| token.len() \u003e= 2)\r\n        .map(str::to_string)\r\n        .collect()\r\n}\r\n\r\nfn section_completeness(cv_text: \u0026str, language: \u0026str) -\u003e f64 {\r\n    let lower = cv_text.to_lowercase();\r\n    let required_sections = if language.eq_ignore_ascii_case(\"vi\") {\r\n        vec![\"kinh nghiệm\", \"kỹ năng\", \"học vấn\", \"dự án\"]\r\n    } else {\r\n        vec![\"experience\", \"skills\", \"education\", \"project\"]\r\n    };\r\n\r\n    let found = required_sections\r\n        .iter()\r\n        .filter(|section| lower.contains(*section))\r\n        .count();\r\n\r\n    found as f64 / required_sections.len() as f64\r\n}\r\n\r\nfn explain(signals: RuleSignals) -\u003e (Vec\u003cString\u003e, Vec\u003cString\u003e, Vec\u003cString\u003e) {\r\n    let mut strengths = Vec::new();\r\n    let mut weaknesses = Vec::new();\r\n    let mut tips = Vec::new();\r\n\r\n    let total_required = signals.matched_skills.len() + signals.missing_skills.len();\r\n\r\n    if !signals.matched_skills.is_empty() {\r\n        let match_rate = if total_required \u003e 0 {\r\n            (signals.matched_skills.len() as f64 / total_required as f64) * 100.0\r\n        } else {\r\n            0.0\r\n        };\r\n        strengths.push(format!(\r\n            \"Technical match: {}/{} skills ({:.1}%). Strong matches: {}\",\r\n            signals.matched_skills.len(),\r\n            total_required,\r\n            match_rate,\r\n            signals\r\n                .matched_skills\r\n                .iter()\r\n                .take(5)\r\n                .cloned()\r\n                .collect::\u003cVec\u003c_\u003e\u003e()\r\n                .join(\", \")\r\n        ));\r\n    }\r\n\r\n    if signals.semantic_overlap \u003e= 0.35 {\r\n        strengths.push(\"Content alignment is good: CV language is close to JD priorities.\".to_string());\r\n    }\r\n\r\n    if let (Some(cv), Some(jd)) = (signals.cv_years, signals.jd_years) {\r\n        if cv \u003e= jd {\r\n            strengths.push(format!(\r\n                \"Experience meets requirement ({} years vs {} years required).\",\r\n                cv, jd\r\n            ));\r\n        } else {\r\n            weaknesses.push(format!(\r\n                \"Experience gap: {} years in CV vs {} years required.\",\r\n                cv, jd\r\n            ));\r\n            tips.push(\r\n                \"Offset the experience gap by highlighting project scope, ownership, and measurable impact.\"\r\n                    .to_string(),\r\n            );\r\n        }\r\n    }\r\n\r\n    if !signals.missing_skills.is_empty() {\r\n        weaknesses.push(format!(\r\n            \"Missing or unclear required skills ({}): {}\",\r\n            signals.missing_skills.len(),\r\n            signals\r\n                .missing_skills\r\n                .iter()\r\n                .take(6)\r\n                .cloned()\r\n                .collect::\u003cVec\u003c_\u003e\u003e()\r\n                .join(\", \")\r\n        ));\r\n nse\u003e để tránh lỗi Infer Type)\r\n    let res_json = response.json::\u003cGeminiResponse\u003e().await.map_err(|e| {\r\n        eprintln!(\"🔥 Gemini Parse Error: {:?}\", e);\r\n        ApiError::Upstream(\"Lỗi định dạng dữ liệu trả về từ AI\".to_string())\r\n    })?;\r\n\r\n    // 5. Trích xuất nội dung text từ cấu hình phân cấp của Google\r\n    let output = res_json\r\n        .candidates\r\n        .first()\r\n        .and_then(|c| c.content.parts.first())\r\n        .map(|p| p.text.clone())\r\n        .ok_or_else(|| {\r\n            eprintln!(\"🔥 Gemini: Phản hồi trống từ Google API\");\r\n            // Sử dụng Internal vì đây là lỗi logic khi dữ liệu không như mong đợi\r\n            ApiError::Internal\r\n        })?;\r\n\r\n    Ok(output)\r\n}\r\n","traces":[{"line":5,"address":[],"length":0,"stats":{"Line":0}},{"line":7,"address":[],"length":0,"stats":{"Line":0}},{"line":14,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":44,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":48,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":22},{"path":["C:","\\","Users","PC","Desktop","rust-vision-buddy","backend","src","modules","ai","handlers.rs"],"content":"use crate::modules::ai::models::{\r\n    ChatAssistantRequest, ChatAssistantResponse, GeminiContent, GeminiPart, GeminiRequest,\r\n    GeminiResponse, ScoreRequest, ScoreResponse,\r\n};\r\nuse crate::modules::auth;\r\nuse crate::shared::api_error::ApiError;\r\nuse crate::shared::app_state::AppState;\r\nuse axum::{extract::State, http::HeaderMap, Json};\r\nuse serde_json::Value;\r\nuse std::time::Duration;\r\n\r\n// ==========================================================\r\n// 1. HANDLER: CHAT ASSISTANT (GEMINI AI)\r\n// ==========================================================\r\npub async fn chat_assistant(\r\n    State(state): State\u003cAppState\u003e,\r\n    headers: HeaderMap,\r\n    Json(payload): Json\u003cChatAssistantRequest\u003e,\r\n) -\u003e Result\u003cJson\u003cChatAssistantResponse\u003e, ApiError\u003e {\r\n    // --- Bước 1: Xác thực người dùng qua Bearer Token ---\r\n    let raw = headers\r\n        .get(\"authorization\")\r\n        .and_then(|value| value.to_str().ok())\r\n        .ok_or(ApiError::Unauthorized)?;\r\n\r\n    let token = raw.strip_prefix(\"Bearer \").ok_or(ApiError::Unauthorized)?;\r\n    auth::service::validate_bearer_token(token, \u0026state)?;\r\n\r\n    // --- Bước 2: Xây dựng Prompt cho AI ---\r\n    let language = payload.language.as_deref().unwrap_or(\"vi\");\r\n    let mut prompt = format!(\r\n        \"Bạn là chuyên gia tư vấn nghề nghiệp. Ngôn ngữ phản hồi: {}.\\n\",\r\n        language\r\n    );\r\n\r\n    if let Some(jd) = \u0026payload.jd_text {\r\n        prompt.push_str(\u0026format!(\"Mô tả công việc (JD): {}\\n\", jd));\r\n    }\r\n    if let Some(cv) = \u0026payload.cv_summary {\r\n        prompt.push_str(\u0026format!(\"Tóm tắt CV: {}\\n\", cv));\r\n    }\r\n    prompt.push_str(\u0026format!(\"Câu hỏi/Yêu cầu: {}\", payload.message));\r\n\r\n    // --- Bước 3: Gọi API Gemini ---\r\n    let url = format!(\r\n        \"https://generativelanguage.googleapis.com/v1beta/models/{}:generateContent?key={}\",\r\n        state.settings.gemini_model, state.settings.gemini_api_key\r\n    );\r\n\r\n    let body = GeminiRequest {\r\n        contents: vec![GeminiContent {\r\n            role: Some(\"user\".to_string()),\r\n            parts: vec![GeminiPart { text: prompt }],\r\n        }],\r\n    };\r\n\r\n    let response = state\r\n        .http\r\n        .post(\u0026url)\r\n        .json(\u0026body)\r\n        .send()\r\n        .await\r\n        .map_err(|e| ApiError::Upstream(format!(\"Lỗi kết nối Gemini: {}\", e)))?;\r\n\r\n    // --- Bước 4: Xử lý kết quả trả về ---\r\n    let res_json = response\r\n        .json::\u003cGeminiResponse\u003e()\r\n        .await\r\n        .map_err(|_| ApiError::Upstream(\"Lỗi dữ liệu từ Gemini\".into()))?;\r\n\r\n    let reply = res_json\r\n        .candidates\r\n        .first()\r\n        .and_then(|c| c.content.parts.first())\r\n        .map(|p| p.text.clone())\r\n        .ok_or(ApiError::Internal)?;\r\n\r\n    Ok(Json(ChatAssistantResponse { reply }))\r\n}\r\n\r\n// ==========================================================\r\n// 2. HANDLER: SCORE CV (CƠ CHẾ AI + FALLBACK)\r\n// ==========================================================\r\npub async fn score_cv(\r\n    State(state): State\u003cAppState\u003e,\r\n    Json(payload): Json\u003cScoreRequest\u003e,\r\n) -\u003e Result\u003cJson\u003cScoreResponse\u003e, ApiError\u003e {\r\n    // Địa chỉ service Python NLP\r\n    let nlp_url = \"http://localhost:8000/score\";\r\n\r\n    // Cố gắng gọi sang Python NLP Service\r\n    let nlp_result = state\r\n        .http\r\n        .post(nlp_url)\r\n        .json(\u0026payload) // Payload này đã được derive Serialize trong models.rs\r\n        .timeout(Duration::from_secs(5))\r\n        .send()\r\n        .await;\r\n\r\n    match nlp_result {\r\n        // TRƯỜNG HỢP 1: Python Service phản hồi thành công\r\n        Ok(res) if res.status().is_success() =\u003e {\r\n            let data: Value = res.json().await.unwrap_or_default();\r\n            Ok(Json(ScoreResponse {\r\n                score: data[\"score\"].as_f64().unwrap_or(0.0),\r\n                match_level: data[\"match_level\"]\r\n                    .as_str()\r\n                    .unwrap_or(\"Unknown\")\r\n                    .to_string(),\r\n                note: Some(\"calculated_by_ai_nlp\".to_string()),\r\n            }))\r\n        }\r\n\r\n        // TRƯỜNG HỢP 2: FALLBACK - Khi Python sập hoặc lỗi kết nối\r\n        _ =\u003e {\r\n            tracing::warn!(\"⚠️ NLP Service unreachable. Using Baseline Scoring Fallback.\");\r\n\r\n            // Gọi hàm tính toán cơ bản bằng Rust\r\n            let fallback_score = calculate_baseline_score(\u0026payload.cv_text, \u0026payload.jd_text);\r\n\r\n            Ok(Json(ScoreResponse {\r\n                score: fallback_score,\r\n                match_level: if fallback_score \u003e 60.0 {\r\n                    \"Good Match\".into()\r\n                } else if fallback_score \u003e 30.0 {\r\n                    \"Average Match\".into()\r\n                } else {\r\n                    \"Needs Improvement\".into()\r\n                },\r\n                note: Some(\"calculated_by_baseline_engine_fallback\".to_string()),\r\n            }))\r\n        }\r\n    }\r\n}\r\n\r\n// ==========================================================\r\n// 3. UTILS: LOGIC TÍNH ĐIỂM DỰ PHÒNG (BASELINE)\r\n// ==========================================================\r\n/// Hàm này tính toán điểm dựa trên sự xuất hiện của các từ khóa quan trọng.\r\npub fn calculate_baseline_score(cv_text: \u0026str, jd_text: \u0026str) -\u003e f64 {\r\n    let cv_lower = cv_text.to_lowercase();\r\n    let jd_lower = jd_text.to_lowercase();\r\n\r\n    // Danh sách từ khóa trọng tâm của dự án\r\n    let keywords = vec![\r\n        \"rust\", \"python\", \"react\", \"api\", \"backend\", \"frontend\ prompt_templates,\r\n    },\r\n    shared::{api_error::ApiError, app_state::AppState},\r\n};\r\n\r\n/// Xử lý hội thoại với trợ lý AI dựa trên ngữ cảnh CV và JD\r\npub async fn chat_assistant(\r\n    state: \u0026AppState,\r\n    message: \u0026str,\r\n    language: \u0026str,\r\n    jd_text: Option\u003c\u0026str\u003e,\r\n    cv_summary: Option\u003c\u0026str\u003e,\r\n    history: Option\u003c\u0026[ChatMessage]\u003e,\r\n) -\u003e Result\u003cChatAssistantResponse, ApiError\u003e {\r\n    // Lấy 8 tin nhắn gần nhất để làm ngữ cảnh cho AI\r\n    let history_lines = history\r\n        .unwrap_or(\u0026[])\r\n        .iter()\r\n        .rev()\r\n        .take(8)\r\n        .collect::\u003cVec\u003c_\u003e\u003e()\r\n        .into_iter()\r\n        .rev()\r\n        .map(|item| format!(\"{}: {}\", item.role, item.content))\r\n        .collect::\u003cVec\u003c_\u003e\u003e();\r\n\r\n    let prompt = prompt_templates::chat_assistant_prompt(\r\n        message,\r\n        language,\r\n        jd_text,\r\n        cv_summary,\r\n        \u0026history_lines,\r\n    );\r\n\r\n    let reply = gemini_client::generate_text(state, prompt).await?;\r\n\r\n    Ok(ChatAssistantResponse {\r\n        reply: reply.trim().to_string(),\r\n    })\r\n}\r\n\r\n/// Hàm tính điểm cơ bản dựa trên từ khóa (được sử dụng cho logic so khớp sơ bộ)\r\npub fn calculate_baseline_score(cv_text: \u0026str, jd_text: \u0026str) -\u003e f64 {\r\n    if cv_text.is_empty() || jd_text.is_empty() {\r\n        return 0.0;\r\n    }\r\n\r\n    let cv_lower = cv_text.to_lowercase();\r\n    let jd_lower = jd_text.to_lowercase();\r\n\r\n    // Danh sách từ khóa kỹ thuật phổ biến để so khớp\r\n    let keywords = [\r\n        \"rust\",\r\n        \"python\",\r\n        \"react\",\r\n        \"typescript\",\r\n        \"axum\",\r\n        \"node\",\r\n        \"sql\",\r\n        \"docker\",\r\n    ];\r\n    let mut matches = 0;\r\n    let mut total_relevant = 0;\r\n\r\n    for kw in keywords {\r\n        if jd_lower.contains(kw) {\r\n            total_relevant += 1;\r\n            if cv_lower.contains(kw) {\r\n                matches += 1;\r\n            }\r\n        }\r\n    }\r\n\r\n    if total_relevant == 0 {\r\n        return 0.0;\r\n    }\r\n    (matches as f64 / total_relevant as f64) * 100.0\r\n}\r\n\r\n// =================================================================\r\n// UNIT TESTS - GIAI ĐOẠN 1: BOUNDARY ANALYSIS\r\n// =================================================================\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn test_calculate_baseline_score_boundaries() {\r\n        // 1. Định nghĩa bảng dữ liệu test (Table-Driven Tests)\r\n        struct TestCase {\r\n            name: \u0026'static str,\r\n            cv_text: \u0026'static str,\r\n            jd_text: \u0026'static str,\r\n            expected_min: f64,\r\n        }\r\n\r\n        let test_cases = vec![\r\n            TestCase {\r\n                name: \"Biên dưới: Chuỗi rỗng hoàn toàn\",\r\n                cv_text: \"\",\r\n                jd_text: \"\",\r\n                expected_min: 0.0,\r\n            },\r\n            TestCase {\r\n                name: \"Biên dưới: CV chỉ có 1 ký tự\",\r\n                cv_text: \"A\",\r\n                jd_text: \"Software Engineer\",\r\n                expected_min: 0.0,\r\n            },\r\n            TestCase {\r\n                name: \"Dữ liệu rác: Toàn ký tự đặc biệt\",\r\n                cv_text: \"!@#$%^\u0026*()_+\",\r\n                jd_text: \"Rust Developer\",\r\n                expected_min: 0.0,\r\n            },\r\n            TestCase {\r\n                name: \"Dữ liệu khớp hoàn toàn: Trường hợp lý tưởng\",\r\n                cv_text: \"Rust Python React TypeScript Axum\",\r\n                jd_text: \"Rust Python React TypeScript Axum\",\r\n                expected_min: 40.0,\r\n            },\r\n            TestCase {\r\n                name: \"Dữ liệu không liên quan: Điểm thấp\",\r\n                cv_text: \"Kế toán trưởng chuyên nghiệp\",\r\n                jd_text: \"Embedded C++ Engineer\",\r\n                expected_min: 0.0,\r\n            },\r\n        ];\r\n\r\n        // 2. Chạy qua từng trường hợp kiểm thử\r\n        for tc in test_cases {\r\n            let score = calculate_baseline_score(tc.cv_text, tc.jd_text);\r\n\r\n            assert!(\r\n                score \u003e= tc.expected_min,\r\n                \"FAILED [{}] - Score nhận được: {} (Kỳ vọng \u003e= {})\",\r\n                tc.name,\r\n                score,\r\n                tc.expected_min\r\n            );\r\n        }\r\n    }\r\n}\r\n","traces":[{"line":11,"address":[],"length":0,"stats":{"Line":0}},{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":39,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":48,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":49,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":52,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":53,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":56,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":57,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":58,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":59,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":60,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":61,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":62,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":63,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":64,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":66,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":67,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":69,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":70,"address":[],"length":0,"stats":{"Line":4611686018427387904}},{"line":71,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":72,"address":[],"length":0,"stats":{"Line":1224979098644774912}},{"line":73,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":78,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":79,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":81,"address":[],"length":0,"stats":{"Line":144115188075855872}}],"covered":24,"coverable":36},{"path":["C:","\\","Users","PC","Desktop","rust-vision-buddy","backend","src","modules","auth","handlers.rs"],"content":"use axum::{\r\n    extract::{Query, State},\r\n    http::HeaderMap,\r\n    response::{Html, IntoResponse, Redirect, Response},\r\n    Json,\r\n};\r\n\r\nuse crate::{\r\n    modules::auth::{\r\n        models::{\r\n            AuthProvider, LoginRequest, LoginResponse, LogoutResponse, OAuthCallbackRequest,\r\n            OAuthInitResponse, RegisterRequest, RegisterResponse,\r\n        },\r\n        oauth, service,\r\n    },\r\n    shared::{api_error::ApiError, api_response::ok, app_state::AppState},\r\n};\r\n\r\npub async fn register(\r\n    State(state): State\u003cAppState\u003e,\r\n    Json(payload): Json\u003cRegisterRequest\u003e,\r\n) -\u003e Result\u003cimpl axum::response::IntoResponse, ApiError\u003e {\r\n    let email = payload.email.trim().to_lowercase();\r\n    service::register(\u0026email, payload.password.trim(), \u0026state).await?;\r\n\r\n    Ok(ok(RegisterResponse {\r\n        message: \"Registered successfully\",\r\n        email,\r\n    }))\r\n}\r\n\r\npub async fn login(\r\n    State(state): State\u003cAppState\u003e,\r\n    Json(payload): Json\u003cLoginRequest\u003e,\r\n) -\u003e Result\u003cimpl axum::response::IntoResponse, ApiError\u003e {\r\n    let email = payload.email.trim().to_lowercase();\r\n    service::validate_credentials(\u0026email, payload.password.trim(), \u0026state).await?;\r\n    let token = service::login(\u0026email, \u0026state)?;\r\n\r\n    Ok(ok(LoginResponse {\r\n        access_token: token,\r\n        token_type: \"Bearer\",\r\n        expires_in_minutes: state.settings.jwt_expires_minutes,\r\n    }))\r\n}\r\n\r\npub async fn logout(\r\n    State(state): State\u003cAppState\u003e,\r\n    headers: HeaderMap,\r\n) -\u003e Result\u003cimpl axum::response::IntoResponse, ApiError\u003e {\r\n    let token = extract_bearer(\u0026headers)?;\r\n    service::validate_bearer_token(\u0026token, \u0026state)?;\r\n    Ok(ok(LogoutResponse {\r\n        message: \"Logged out successfully\",\r\n    }))\r\n}\r\n\r\nfn extract_bearer(headers: \u0026HeaderMap) -\u003e Result\u003cString, ApiError\u003e {\r\n    let raw = headers\r\n        .get(\"authorization\")\r\n        .and_then(|value| value.to_str().ok())\r\n        .ok_or(ApiError::Unauthorized)?;\r\n\r\n    if let Some(token) = raw.strip_prefix(\"Bearer \") {\r\n        Ok(token.to_string())\r\n    } else {\r\n        Err(ApiError::Unauthorized)\r\n    }\r\n}\r\n\r\n// ==================== OAuth Handlers ====================\r\n\r\npub async fn google_login(\r\n    State(state): State\u003cAppState\u003e,\r\n    headers: HeaderMap,\r\n) -\u003e Result\u003cimpl axum::response::IntoResponse, ApiError\u003e {\r\n    let (auth_url, csrf_token) = oauth::generate_google_auth_url(\u0026state)?;\r\n    let frontend_url = extract_frontend_url(\u0026headers, \u0026state);\r\n    state.store_oauth_state(csrf_token, frontend_url).await;\r\n\r\n    Ok(ok(OAuthInitResponse {\r\n        authorization_url: auth_url,\r\n    }))\r\n}\r\n\r\npub async fn google_callback(\r\n    State(state): State\u003cAppState\u003e,\r\n    Query(params): Query\u003cOAuthCallbackRequest\u003e,\r\n) -\u003e Result\u003cResponse, ApiError\u003e {\r\n    let frontend_url = validate_oauth_state(params.state.as_deref(), \u0026state).await?;\r\n\r\n    if let Some(provider_error) = params.error.as_deref() {\r\n        let description = params\r\n            .error_description\r\n            .as_deref()\r\n            .unwrap_or(provider_error);\r\n        return Ok(build_oauth_error_bridge_response(\r\n            \u0026frontend_url,\r\n            \u0026state.settings.frontend_url,\r\n            description,\r\n        ));\r\n    }\r\n\r\n    let code = params\r\n        .code\r\n        .ok_or_else(|| ApiError::BadRequest(\"Missing authorization code\".to_string()))?;\r\n\r\n    let user_info = oauth::exchange_google_code(code, \u0026state).await?;\r\n\r\n    let user = service::find_or_create_oauth_user(\r\n        \u0026user_info.email,\r\n        user_info.name.as_deref(),\r\n        user_info.picture.as_deref(),\r\n        \u0026user_info.id,\r\n        AuthProvider::Google,\r\n        \u0026state,\r\n    )\r\n    .await?;\r\n\r\n    let token = service::login(\u0026user.email, \u0026state)?;\r\n    let frontend_url = frontend_url.trim_end_matches('/');\r\n\r\n    Ok(build_oauth_success_bridge_response(\r\n        frontend_url,\r\n        \u0026state.settings.frontend_url,\r\n        \u0026token,\r\n        \u0026user.email,\r\n    ))\r\n}\r\n\r\npub async fn github_login(\r\n    State(state): State\u003cAppState\u003e,\r\n    headers: HeaderMap,\r\n) -\u003e Result\u003cimpl axum::response::IntoResponse, ApiError\u003e {\r\n    let (auth_url, csrf_token) = oauth::generate_github_auth_url(\u0026state)?;\r\n    let frontend_url = extract_frontend_url(\u0026headers, \u0026state);\r\n    state.store_oauth_state(csrf_token, frontend_url).await;\r\n\r\n    Ok(ok(OAuthInitResponse {\r\n        authorization_url: auth_url,\r\n    }))\r\n}\r\n\r\npub async fn github_callback(\r\n    State(state): State\u003cAppState\u003e,\r\n    Query(params): Query\u003cOAuthCallbackRequest\u003e,\r\n) -\u003e Result\u003cResponse, ApiError\u003e {\r\n    let frontend_url = validate_oauth_state(params.state.as_deref(), \u0026state).await?;\r\n\r\n    if let Some(provider_error) = params.error.as_deref() {\r\n        let description = params\r\n            .error_description\r\n            .as_deref()\r\n            .unwrap_or(provider_error);\r\n        return Ok(build_oauth_error_bridge_response(\r\n            \u0026frontend_url,\r\n            \u0026state.settings.frontend_url,\r\n            description,\r\n        ));\r\n    }\r\n\r\n    let code = params\r\n        .code\r\n        .ok_or_else(|| ApiError::BadRequest(\"Missing authorization code\".to_string()))?;\r\n\r\n    let user_info = oauth::exchange_github_code(code, \u0026state).await?;\r\n\r\n    let email = user_info\r\n        .email\r\n        .unwrap_or_else(|| format!(\"{}@github.local\", user_info.login));\r\n\r\n    let user = service::find_or_create_oauth_user(\r\n        \u0026email,\r\n        user_info.name.as_deref(),\r\n        user_info.avatar_url.as_deref(),\r\n        \u0026user_info.id.to_string(),\r\n        AuthProvider::GitHub,\r\n        \u0026state,\r\n    )\r\n    .await?;\r\n\r\n    let token = service::login(\u0026user.email, \u0026state)?;\r\n    let frontend_url = frontend_url.trim_end_matches('/');\r\n\r\n    Ok(build_oauth_success_bridge_response(\r\n        frontend_url,\r\n        \u0026state.settings.frontend_url,\r\n        \u0026token,\r\n        \u0026user.email,\r\n    ))\r\n}\r\n\r\nasync fn validate_oauth_state(\r\n    state_param: Option\u003c\u0026str\u003e,\r\n    state: \u0026AppState,\r\n) -\u003e Result\u003cString, ApiError\u003e {\r\n    let token = state_param\r\n        .filter(|value| !value.trim().is_empty())\r\n        .ok_or_else(|| ApiError::BadRequest(\"Missing OAuth state\".to_string()))?;\r\n\r\n    if let Some(frontend_url) = state.consume_oauth_state(token).await {\r\n        return Ok(frontend_url);\r\n    }\r\n\r\n    Err(ApiError::BadRequest(\r\n        \"Invalid or expired OAuth state\".to_string(),\r\n    ))\r\n}\r\n\r\nfn extract_frontend_url(headers: \u0026HeaderMap, state: \u0026AppState) -\u003e String {\r\n    let fallback = state\r\n        .settings\r\n        .frontend_url\r\n        .trim_end_matches('/')\r\n        .to_string();\r\n\r\n    headers\r\n        .get(\"origin\")\r\n        .and_then(|v| v.to_str().ok())\r\n        .map(str::trim)\r\n        .filter(|origin| {\r\n            origin.starts_with(\"http://localhost\") || origin.starts_with(\"http://127.0.0.1\")\r\n        })\r\n        .map(|origin| origin.trim_end_matches('/').to_string())\r\n        .unwrap_or(fallback)\r\n}\r\n\r\nfn build_oauth_success_bridge_response(\r\n    preferred_frontend: \u0026str,\r\n    fallback_frontend: \u0026str,\r\n    token: \u0026str,\r\n    email: \u0026str,\r\n) -\u003e Response {\r\n    let candidates = oauth_frontend_candidates(preferred_frontend, fallback_frontend);\r\n    let candidates_json = serde_json::to_string(\u0026candidates)\r\n        .unwrap_or_else(|_| \"[\\\"http://localhost:8080\\\",\\\"http://localhost:5173\\\"]\".to_string());\r\n    let token_json = serde_json::to_string(token).unwrap_or_else(|_| \"\\\"\\\"\".to_string());\r\n    let email_json = serde_json::to_string(email).unwrap_or_else(|_| \"\\\"\\\"\".to_string());\r\n\r\n    let html = format!(\r\n        r#\"\u003c!doctype html\u003e\r\n\u003chtml\u003e\r\n    \u003chead\u003e\r\n        \u003cmeta charset=\"utf-8\" /\u003e\r\n        \u003ctitle\u003eOAuth Redirect\u003c/title\u003e\r\n    \u003c/head\u003e\r\n    \u003cbody\u003e\r\n        \u003cp\u003eCompleting sign-in...\u003c/p\u003e\r\n _lowercase();\r\n\r\n    let formal_markers_vi = [\r\n        \"tập đoàn\", \"ngân hàng\", \"tuân thủ\", \"quy trình\", \"enterprise\",\r\n    ];\r\n    let formal_markers_en = [\r\n        \"corporation\", \"bank\", \"compliance\", \"governance\", \"enterprise\",\r\n    ];\r\n    let persuasive_markers = [\r\n        \"marketing\", \"sales\", \"growth\", \"brand\", \"business development\",\r\n    ];\r\n    let concise_markers = [\"startup\", \"fast-paced\", \"remote\", \"product\", \"agile\"];\r\n\r\n    if persuasive_markers.iter().any(|m| jd_lower.contains(m)) {\r\n        return \"persuasive\";\r\n    }\r\n    if concise_markers.iter().any(|m| jd_lower.contains(m)) {\r\n        return \"concise\";\r\n    }\r\n\r\n    if lang == \"vi\" {\r\n        if formal_markers_vi.iter().any(|m| jd_lower.contains(m)) {\r\n            return \"formal\";\r\n        }\r\n        return \"casual\";\r\n    }\r\n\r\n    if formal_markers_en.iter().any(|m| jd_lower.contains(m)) {\r\n        return \"formal\";\r\n    }\r\n    \"casual\"\r\n}\r\n\r\nfn resolve_style(style: \u0026str, jd_text: \u0026str, language: \u0026str) -\u003e \u0026'static str {\r\n    let normalized = normalize_style(style);\r\n    if normalized == \"auto\" {\r\n        return auto_style_from_jd(jd_text, language);\r\n    }\r\n    normalized\r\n}\r\n\r\nfn clean_line(line: \u0026str) -\u003e String {\r\n    line.replace('\\u{feff}', \"\")\r\n        .replace(['\\t', '|', '•', '●'], \" \")\r\n        .split_whitespace()\r\n        .collect::\u003cVec\u003c_\u003e\u003e()\r\n        .join(\" \")\r\n}\r\n\r\n#[allow(dead_code)]\r\nfn trim_trailing_punctuation(text: \u0026str) -\u003e String {\r\n    text.trim()\r\n        .trim_end_matches(|c: char| [',', ';', ':', '.'].contains(\u0026c))\r\n        .to_string()\r\n}\r\n\r\nfn looks_like_name(line: \u0026str) -\u003e bool {\r\n    let trimmed = line.trim();\r\n    if trimmed.is_empty() || trimmed.len() \u003c 4 || trimmed.len() \u003e 60 {\r\n        return false;\r\n    }\r\n\r\n    let lower = trimmed.to_lowercase();\r\n    let blocked_tokens = [\r\n        \"cv\", \"resume\", \"email\", \"phone\", \"address\", \"experience\", \"skills\", \"github\", \"linkedin\",\r\n    ];\r\n    if blocked_tokens.iter().any(|token| lower.contains(token)) {\r\n        return false;\r\n    }\r\n    if trimmed.chars().any(|c| c.is_ascii_digit()) {\r\n        return false;\r\n    }\r\n\r\n    let words = trimmed.split_whitespace().collect::\u003cVec\u003c_\u003e\u003e();\r\n    (2..=6).contains(\u0026words.len())\r\n}\r\n\r\nfn extract_candidate_name(cv_text: \u0026str) -\u003e String {\r\n    let lines: Vec\u003cString\u003e = cv_text.lines().map(clean_line).collect();\r\n    let name_re = Regex::new(r\"(?i)(full\\s*name|họ\\s*và\\s*tên|name)[:：-]\\s*([^,\\n;]+)\").unwrap();\r\n\r\n    for line in \u0026lines {\r\n        if let Some(cap) = name_re.captures(line) {\r\n            let n = clean_line(\u0026cap[2]);\r\n            if looks_like_name(\u0026n) {\r\n                return n;\r\n            }\r\n        }\r\n    }\r\n\r\n    for line in \u0026lines {\r\n        if looks_like_name(line) {\r\n            return line.clone();\r\n        }\r\n    }\r\n    \"Ứng viên\".to_string()\r\n}\r\n\r\nfn extract_years_experience(cv_text: \u0026str) -\u003e String {\r\n    let re = Regex::new(r\"(\\d+)\\s*\\+?\\s*(year|năm)\").unwrap();\r\n    re.captures(cv_text)\r\n        .map(|c| c[1].to_string())\r\n        .unwrap_or_else(|| \"3\".to_string())\r\n}\r\n\r\nfn extract_email(cv_text: \u0026str) -\u003e Option\u003cString\u003e {\r\n    let re = Regex::new(r\"(?i)\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}\\b\").unwrap();\r\n    re.find(cv_text).map(|m| m.as_str().to_string())\r\n}\r\n\r\nfn extract_phone(cv_text: \u0026str) -\u003e Option\u003cString\u003e {\r\n    let re = Regex::new(r\"(\\+?\\d[\\d\\s.-]{8,15}\\d)\").unwrap();\r\n    re.find(cv_text).map(|m| m.as_str().trim().to_string())\r\n}\r\n\r\nfn extract_address(cv_text: \u0026str) -\u003e Option\u003cString\u003e {\r\n    let re = Regex::new(r\"(?i)(address|địa\\s*chỉ)[:：-]\\s*(.+)\").unwrap();\r\n    for line in cv_text.lines() {\r\n        if let Some(cap) = re.captures(line) {\r\n            return Some(clean_line(\u0026cap[2]));\r\n        }\r\n    }\r\n    None\r\n}\r\n\r\nfn extract_key_skills(cv_text: \u0026str) -\u003e String {\r\n    let skill_patterns = [\r\n        \"python\", \"java\", \"javascript\", \"typescript\", \"react\", \"node\", \"docker\",\r\n        \"rust\", \"sql\", \"aws\", \"git\", \"linux\", \"ci/cd\", \"agile\",\r\n    ];\r\n    let lower = cv_text.to_lowercase();\r\n    let mut found = Vec::new();\r\n    for skill in skill_patterns {\r\n        if lower.contains(skill) {\r\n            found.push(skill);\r\n        }\r\n    }\r\n\r\n    if found.is_empty() {\r\n        \"Software Development, Problem Solving\".to_string()\r\n    } else {\r\n        found.join(\", \")\r\n    }\r\n}\r\n\r\nfn extract_certificates(cv_text: \u0026str) -\u003e Option\u003cString\u003e {\r\n    let re = Regex::new(r\"(?i)(certificate|chứng\\s*chỉ)[:：-]\\s*(.+)\").unwrap();\r\n    cv_text\r\n        .lines()\r\n        .find_map(|l| re.captures(l).map(|c| clean_line(\u0026c[2])))\r\n}\r\n\r\nfn extract_company_name(jd_text: \u0026str) -\u003e String {\r\n    let re = Regex::new(r\"(?i)(company|công\\s*ty)[:：-]\\s*([^,\\n;]+)\").unwrap();\r\n    jd_text\r\n        .lines()\r\n        .find_map(|l| re.captures(l).map(|c| clean_line(\u0026c[2])))\r\n        .unwrap_or_else(|| \"Quý công ty\".to_string())\r\n}\r\n\r\nfn extract_recipient(jd_text: \u0026str, language: \u0026str) -\u003e String {\r\n    let lang_vi = language.contains(\"vi\");\r\n    let re = Regex::new(r\"(?i)(dear|kính\\s*gửi|attention)[:：]?\\s*([^,\\n;]+)\").unwrap();\r\n\r\n    jd_text\r\n        .lines()\r\n        .find_map(|l| re.captures(l).map(|c| clean_line(\u0026c[2])))\r\n        .unwrap_or_else(|| {\r\n            if lang_vi {\r\n                \"Bộ phận Tuyển dụng\".to_string()\r\n            } else {\r\n                \"Hiring Manager\".to_string()\r\n            }\r\n        })\r\n}\r\n\r\nfn extract_position(jd_text: \u0026str) -\u003e String {\r\n    let re = Regex::new(r\"(?i)(position|vị\\s*trí)[:：-]\\s*([^,\\n;]+)\").unwrap();\r\n    jd_text\r\n        .lines()\r\n        .find_map(|l| re.captures(l).map(|c| clean_line(\u0026c[2])))\r\n        .unwrap_or_else(|| \"Software Engineer\".to_string())\r\n}\r\n\r\npub fn extract_metadata(cv_text: \u0026str, jd_text: \u0026str, language: \u0026str) -\u003e ExtractedMetadata {\r\n    ExtractedMetadata {\r\n        candidate_name: extract_candidate_name(cv_text),\r\n        recipient: extract_recipient(jd_text, language),\r\n        company_name: extract_company_name(jd_text),\r\n        position: extract_position(jd_text),\r\n        years_experience: extract_years_experience(cv_text),\r\n        key_skills: extract_key_skills(cv_text),\r\n        certificates: extract_certificates(cv_text),\r\n        email: extract_email(cv_text),\r\n        phone: extract_phone(cv_text),\r\n        address: extract_address(cv_text),\r\n    }\r\n}\r\n\r\nfn build_context(cv_text: \u0026str, jd_text: \u0026str, language: \u0026str) -\u003e Context {\r\n    let mut ctx = Context::new();\r\n    let meta = extract_metadata(cv_text, jd_text, language);\r\n    ctx.insert(\"candidate_name\", \u0026meta.candidate_name);\r\n    ctx.insert(\"years_experience\", \u0026meta.years_experience);\r\n    ctx.insert(\"key_skills\", \u0026meta.key_skills);\r\n    ctx.insert(\"company_name\", \u0026meta.company_name);\r\n    ctx.insert(\"position\", \u0026meta.position);\r\n    ctx.insert(\"recipient\", \u0026meta.recipient);\r\n    if let Some(e) = meta.email {\r\n        ctx.insert(\"email\", \u0026e);\r\n    }\r\n    if let Some(p) = meta.phone {\r\n        ctx.insert(\"phone\", \u0026p);\r\n    }\r\n    ctx\r\n}\r\n\r\n// Hàm render thật sự sử dụng Tera - Để test các hàm này cần mock file hệ thống hoặc init Tera\r\npub fn render_email_subject(cv: \u0026str, jd: \u0026str, lang: \u0026str, style: \u0026str) -\u003e Result\u003cString, tera::Error\u003e {\r\n    let s = resolve_style(style, jd, lang);\r\n    let name = format!(\"email_subject_{}_{}.tera\", s, lang);\r\n    get_templates().render(\u0026name, \u0026build_context(cv, jd, lang))\r\n}\r\n\r\npub fn render_email_body(cv: \u0026str, jd: \u0026str, lang: \u0026str, style: \u0026str) -\u003e Result\u003cString, tera::Error\u003e {\r\n    let s = resolve_style(style, jd, lang);\r\n    let name = format!(\"email_body_{}_{}.tera\", s, lang);\r\n    get_templates().render(\u0026name, \u0026build_context(cv, jd, lang))\r\n}\r\n\r\npub fn render_cover_letter(cv: \u0026str, jd: \u0026str, lang: \u0026str, style: \u0026str) -\u003e Result\u003cString, tera::Error\u003e {\r\n    let s = resolve_style(style, jd, lang);\r\n    let name = format!(\"cover_letter_{}_{}.tera\", s, lang);\r\n    get_templates().render(\u0026name, \u0026build_context(cv, jd, lang))\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn test_normalize_style() {\r\n        assert_eq!(normalize_style(\"FORMAL\"), \"formal\");\r\n        assert_eq!(normalize_style(\" creative \"), \"persuasive\");\r\n        assert_eq!(normalize_style(\"unknown\"), \"auto\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_auto_style_from_jd() {\r\n        let jd_bank = \"Làm việc tại ngân hàng với quy trình nghiêm ngặt\";\r\n        assert_eq!(auto_style_from_jd(jd_bank, \"vi\"), \"formal\");\r\n\r\n        let jd_startup = \"Fast-paced startup looking for agile developers\";\r\n        assert_eq!(auto_style_from_jd(jd_startup, \"en\"), \"concise\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_clean_line() {\r\n        let line = \"• Nguyễn | Văn \\t A\";\r\n        assert_eq!(clean_line(line), \"Nguyễn Văn A\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_extract_candidate_name() {\r\n        let cv = \"Họ và tên: Nguyễn Văn Rust\\nEmail: rust@example.com\";\r\n        assert_eq!(extract_candidate_name(cv), \"Nguyễn Văn Rust\");\r\n\r\n        let cv_no_tag = \"Trần Thị Backend\\nKinh nghiệm làm việc...\";\r\n        assert_eq!(extract_candidate_name(cv_no_tag), \"Trần Thị Backend\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_extract_metadata_full() {\r\n        let cv = \"Nguyễn Văn A\\n5 years experience\\nSkills: Rust, Python\\nEmail: a@test.com\";\r\n        let jd = \"Công ty: TechCorp\\nVị trí: Senior Dev\\nKính gửi: Ban Giám Đốc\";\r\n\r\n        let meta = extract_metadata(cv, jd, \"vi\");\r\n\r\n        assert_eq!(meta.candidate_name, \"Nguyễn Văn A\");\r\n        assert_eq!(meta.company_name, \"TechCorp\");\r\n        assert_eq!(meta.years_experience, \"5\");\r\n        assert_eq!(meta.key_skills, \"python, rust\");\r\n        assert_eq!(meta.email, Some(\"a@test.com\".to_string()));\r\n    }\r\n\r\n    #[test]\r\n    fn test_looks_like_name_validation() {\r\n        assert!(looks_like_name(\"Nguyễn Văn A\"));\r\n        assert!(!looks_like_name(\"CV_2024\")); // Chứa từ khóa chặn\r\n        assert!(!looks_like_name(\"John\")); // Quá ngắn\r\n        assert!(!looks_like_name(\"Nguyen 123\")); // Chứa số\r\n    }\r\n}\r\n","traces":[{"line":8,"address":[],"length":0,"stats":{"Line":0}},{"line":9,"address":[],"length":0,"stats":{"Line":0}},{"line":10,"address":[],"length":0,"stats":{"Line":0}},{"line":11,"address":[],"length":0,"stats":{"Line":0}},{"line":12,"address":[],"length":0,"stats":{"Line":0}},{"line":13,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":17,"address":[],"length":0,"stats":{"Line":0}},{"line":20,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":21,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":22,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":23,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":24,"address":[],"length":0,"sta
