efault()\r\n            },\r\n            CvSection {\r\n                id: \"section-skills\".into(),\r\n                r#type: \"skills\".into(),\r\n                title: \"Kỹ năng\".into(),\r\n                visible: true,\r\n                items: vec![\r\n                    CvSectionItem {\r\n                        id: Uuid::new_v4().to_string(),\r\n                        title: \"React\".into(),\r\n                        ..Default::default()\r\n                    },\r\n                    CvSectionItem {\r\n                        id: Uuid::new_v4().to_string(),\r\n                        title: \"Rust\".into(),\r\n                        ..Default::default()\r\n                    },\r\n                    CvSectionItem {\r\n                        id: Uuid::new_v4().to_string(),\r\n                        title: \"Python\".into(),\r\n                        ..Default::default()\r\n                    },\r\n                ],\r\n                ..Default::default()\r\n            },\r\n            CvSection {\r\n                id: \"section-summary\".into(),\r\n                r#type: \"summary\".into(),\r\n                title: \"Giới thiệu\".into(),\r\n                visible: true,\r\n                content: Some(\"Đây là nội dung tóm tắt chuyên môn của tôi.\".into()),\r\n                ..Default::default()\r\n            },\r\n            CvSection {\r\n                id: \"section-exp\".into(),\r\n                r#type: \"experience\".into(),\r\n                title: \"Kinh nghiệm làm việc\".into(),\r\n                visible: true,\r\n                items: vec![CvSectionItem {\r\n                    id: Uuid::new_v4().to_string(),\r\n                    title: \"CÔNG TY ABC\".into(),\r\n                    subtitle: Some(\"Software Engineer\".into()),\r\n                    description: Some(\"Lập trình Rust/React\".into()),\r\n                    date: Some(\"2024 - Hiện tại\".into()),\r\n                    ..Default::default()\r\n                }],\r\n                ..Default::default()\r\n            },\r\n            CvSection {\r\n                id: \"section-edu\".into(),\r\n                r#type: \"education\".into(),\r\n                title: \"Học vấn\".into(),\r\n                visible: true,\r\n                items: vec![CvSectionItem {\r\n                    id: Uuid::new_v4().to_string(),\r\n                    title: \"ĐẠI HỌC CÔNG NGHỆ\".into(),\r\n                    subtitle: Some(\"Cử nhân CNTT\".into()),\r\n                    date: Some(\"2020 - 2024\".into()),\r\n                    ..Default::default()\r\n                }],\r\n                ..Default::default()\r\n            },\r\n        ],\r\n        layout: CvLayoutState {\r\n            full_width: vec![\"section-header\".into()],\r\n            left_column: vec![\"section-skills\".into()],\r\n            right_column: vec![\r\n                \"section-summary\".into(),\r\n                \"section-exp\".into(),\r\n                \"section-edu\".into(),\r\n            ],\r\n            unused: vec![],\r\n        },\r\n    };\r\n\r\n    let layout_value = serde_json::to_value(\u0026default_layout).map_err(|e| {\r\n        error!(\"🔥 Serialization failed: {:?}\", e);\r\n        StatusCode::INTERNAL_SERVER_ERROR\r\n    })?;\r\n\r\n    sqlx::query!(\r\n        r#\"INSERT INTO cvs (id, user_id, name, layout_data) VALUES ($1, $2, $3, $4)\"#,\r\n        cv_id,\r\n        user_id,\r\n        payload.name,\r\n        layout_value\r\n    )\r\n    .execute(\u0026state.db)\r\n    .await\r\n    .map_err(|e| {\r\n        error!(\"🔥 DB Insert Error: {:?}\", e);\r\n        StatusCode::INTERNAL_SERVER_ERROR\r\n    })?;\r\n\r\n    Ok((\r\n        StatusCode::CREATED,\r\n        Json(CvResponse {\r\n            id: cv_id,\r\n            message: \"Tạo CV thành công\".into(),\r\n        }),\r\n    ))\r\n}\r\n\r\n/// 2. Lấy chi tiết CV theo ID\r\npub async fn get_cv_by_id(\r\n    State(state): State\u003cAppState\u003e,\r\n    Path(id_str): Path\u003cString\u003e,\r\n) -\u003e Result\u003cJson\u003cCv\u003e, StatusCode\u003e {\r\n    let target_id = Uuid::parse_str(\u0026id_str).map_err(|_| StatusCode::BAD_REQUEST)?;\r\n\r\n    let cv = sqlx::query_as!(\r\n        Cv,\r\n        r#\"SELECT id, user_id, name,\r\n                  layout_data as \"layout_data: sqlx::types::Json\u003cCvLayoutData\u003e\",\r\n                  created_at, updated_at\r\n        FROM cvs WHERE id = $1\"#,\r\n        target_id\r\n    )\r\n    .fetch_one(\u0026state.db)\r\n    .await\r\n    .map_err(|e| match e {\r\n        sqlx::Error::RowNotFound =\u003e StatusCode::NOT_FOUND,\r\n        _ =\u003e StatusCode::INTERNAL_SERVER_ERROR,\r\n    })?;\r\n\r\n    Ok(Json(cv))\r\n}\r\n\r\n/// 3. Cập nhật CV\r\npub async fn update_cv(\r\n    State(state): State\u003cAppState\u003e,\r\n    Path(id_str): Path\u003cString\u003e,\r\n    Json(payload): Json\u003cUpdateCvRequest\u003e,\r\n) -\u003e Result\u003cStatusCode, StatusCode\u003e {\r\n    let target_id = Uuid::parse_str(\u0026id_str).map_err(|_| StatusCode::BAD_REQUEST)?;\r\n\r\n    let layout_value = serde_json::to_value(\u0026payload.layout_data).map_err(|e| {\r\n        error!(\"🔥 Lỗi Serialize Update: {:?}\", e);\r\n        StatusCode::INTERNAL_SERVER_ERROR\r\n    })?;\r\n\r\n    sqlx::query!(\r\n        r#\"UPDATE cvs SET name = COALESCE($1, name), layout_data = $2, updated_at = NOW() WHERE id = $3\"#,\r\n        payload.name,\r\n        layout_value,\r\n        target_id\r\n    )\r\n    .execute(\u0026state.db)\r\n    .await\r\n    .map_err(|_| StatusCode::INTERNAL_SERVER_ERROR)?;\r\n\r\n    Ok(StatusCode::OK)\r\n}\r\n\r\n/// 4. Xuất PDF\r\npub async fn export_cv_pdf(\r\n    State(_state): State\u003cAppState\u003e,\r\n    headers: HeaderMap,\r\n    Path(id_str): Path\u003cString\u003e,\r\n) -\u003e impl IntoResponse {\r\n    let token = headers\r\n        .get(header::AUTHORIZATION)\r\n        .and_then(|h| h.to_str().ok())\r\n        .map(|s| s.replace(\"Bearer \", \"\"));\r\n\r\n    let frontend_url =\r\n        std::env::var(\"FRONTEND_URL\").unwrap_or_else(|_| \"http://localhost:5173\".to_string());\r\n    let target_url = format!(\"{}/preview/{}\", frontend_url, id_str);\r\n\r\n    match PdfService::render_pdf(target_url, token).await {\r\n        Ok(pdf_bytes) =\u003e {\r\n            let filename = format!(\"CV_{}.pdf\", id_str);\r\n            let mut res_headers = HeaderMap::new();\r\n            res_headers.insert(\r\n                header::CONTENT_TYPE,\r\n                HeaderValue::from_static(\"application/pdf\"),\r\n            );\r\n            res_headers.insert(\r\n                header::CONTENT_DISPOSITION,\r\n                HeaderValue::from_str(\u0026format!(\"attachment; filename=\\\"{}\\\"\", filename)).unwrap(),\r\n            );\r\n            res_headers.insert(\r\n                header::CACHE_CONTROL,\r\n                HeaderValue::from_static(\"no-cache, no-store, must-revalidate\"),\r\n            );\r\n            (StatusCode::OK, res_headers, pdf_bytes).into_response()\r\n        }\r\n        Err(status) =\u003e (status, \"Lỗi render PDF\").into_response(),\r\n    }\r\n}\r\n\r\n/// 5. Danh sách CV\r\npub async fn list_user_cvs(State(state): State\u003cAppState\u003e) -\u003e Result\u003cJson\u003cVec\u003cCv\u003e\u003e, StatusCode\u003e {\r\n    let cvs = sqlx::query_as!(\r\n        Cv,\r\n        r#\"SELECT id, user_id, name,\r\n                  layout_data as \"layout_data: sqlx::types::Json\u003cCvLayoutData\u003e\",\r\n                  created_at, updated_at\r\n        FROM cvs\r\n        ORDER BY updated_at DESC\"#\r\n    )\r\n    .fetch_all(\u0026state.db)\r\n    .await\r\n    .map_err(|e| {\r\n        error!(\"🔥 List Error: {:?}\", e);\r\n        StatusCode::INTERNAL_SERVER_ERROR\r\n    })?;\r\n\r\n    Ok(Json(cvs))\r\n}\r\n\r\n/// 6. Xóa CV\r\npub async fn delete_cv(\r\n    State(state): State\u003cAppState\u003e,\r\n    Path(id_str): Path\u003cString\u003e,\r\n) -\u003e Result     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
