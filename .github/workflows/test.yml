name: Career Compass Testing Pipeline

on:
  push:
    # Thêm feat/testing vào đây để GitHub nhận diện được branch hiện tại của bạn
    branches: ["main", "develop", "feat/testing"]
  pull_request:
    branches: ["main", "develop", "feat/testing"]

jobs:
  test_and_coverage:
    name: Run Tests & Measure Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: career_compass_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: ⚙️ Caching Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: ⚙️ Install cargo-tarpaulin
        run: |
          if ! command -v cargo-tarpaulin &> /dev/null; then
            cargo install cargo-tarpaulin
          fi

      # Bước này sẽ giúp bạn tìm lỗi Typo như "ax_um" nhanh hơn
      - name: 🔍 Clippy Linter (Check lỗi code)
        working-directory: ./backend
        run: cargo clippy -- -D warnings || echo "Clippy found issues"

      - name: 🚀 Run Tests & Measure Coverage
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/career_compass_test
        # Sử dụng --ignore-panics để vẫn xuất báo cáo ngay cả khi code đang lỗi biên dịch cục bộ
        run: cargo tarpaulin --out Html --engine llvm --ignore-panics

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always() # Luôn upload báo cáo kể cả khi test fail để bạn có bằng chứng đi báo cáo
        with:
          name: code-coverage-report
          path: backend/tarpaulin-report.html
