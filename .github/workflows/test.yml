name: Career Compass Testing Pipeline

on:
  push:
    branches: ["main", "develop", "feat/testing"]
  pull_request:
    branches: ["main", "develop", "feat/testing"]

env:
  # Tắt chế độ offline để SQLx kiểm tra trực tiếp với DB trong CI
  SQLX_OFFLINE: false
  DATABASE_URL: postgresql://postgres:admin@localhost:5432/rust-vision-buddy

jobs:
  test_and_coverage:
    name: Run Tests & Measure Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: rust-vision-buddy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: ⚙️ Caching Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🗄️ Install SQLx CLI
        run: |
          if ! command -v sqlx &> /dev/null; then
            cargo install sqlx-cli --no-default-features --features postgres
          fi

      - name: 🚀 Setup Database & Migrations
        working-directory: ./backend
        run: |
          sqlx database create
          sqlx migrate run

      - name: 🔍 Clippy Check
        working-directory: ./backend
        run: cargo clippy -- -D warnings || echo "Clippy warnings detected"

      - name: 🧪 Run Tests & Measure Coverage
        working-directory: ./backend
        env:
          # Các biến môi trường cần thiết cho code backend chạy
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test_secret_key_for_ci_12345' }}
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          JWT_EXPIRES_MINUTES: 120
          NLP_SERVICE_URL: "http://127.0.0.1:8001"
          FRONTEND_URL: "http://localhost:3000"
        # Sử dụng cargo-tarpaulin để đo coverage.
        # Nếu chưa cài tarpaulin trong bin cache, bước này sẽ tự cài (tốn thêm 1-2p lần đầu)
        run: |
          if ! command -v cargo-tarpaulin &> /dev/null; then
            cargo install cargo-tarpaulin
          fi
          cargo tarpaulin --out Html --engine llvm --ignore-panics --no-fail-fast

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-coverage-report
          path: backend/tarpaulin-report.html
