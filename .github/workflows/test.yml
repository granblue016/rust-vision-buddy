name: Career Compass Testing Pipeline

on:
  push:
    branches: ["main", "develop", "feat/testing"]
  pull_request:
    branches: ["main", "develop", "feat/testing"]

env:
  SQLX_OFFLINE: true

jobs:
  test_and_coverage:
    name: Run Tests & Measure Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: rust-vision-buddy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: ⚙️ Caching Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🗄️ Install Tools
        run: |
          if ! command -v sqlx &> /dev/null; then
            cargo install sqlx-cli --no-default-features --features postgres
          fi
          if ! command -v cargo-tarpaulin &> /dev/null; then
            cargo install cargo-tarpaulin
          fi

      - name: 🚀 Setup Database Migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:admin@localhost:5432/rust-vision-buddy
        run: sqlx database setup

      - name: 🔍 Clippy Check
        working-directory: ./backend
        # Không dùng -D warnings để pipeline không bị dừng bởi các cảnh báo nhỏ
        run: cargo clippy || echo "Clippy warnings detected"

      - name: 🧪 Run Tests & Measure Coverage
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:admin@localhost:5432/rust-vision-buddy
        run: cargo tarpaulin --out Html --engine llvm --ignore-panics --no-fail-fast

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-coverage-report
          path: backend/tarpaulin-report.html
